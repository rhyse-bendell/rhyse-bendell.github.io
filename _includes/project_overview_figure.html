{% if page.img %}
{% assign requested_align = include.align | default: 'left' | downcase %}
{% if requested_align != 'right' %}
  {% assign requested_align = 'left' %}
{% endif %}

<style>
  .project-overview-figure {
    width: min(44%, 420px);
    max-width: 420px;
    border: 1px solid #e6e9ef;
    border-radius: 14px;
    background: #fafbfd;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
  }

  .project-overview-figure--left {
    float: left;
    margin: 0.35rem 1.35rem 1rem 0;
  }

  .project-overview-figure--right {
    float: right;
    margin: 0.35rem 0 1rem 1.35rem;
  }

  .project-overview-figure img {
    width: 100%;
    height: auto;
    display: block;
  }

  @media (max-width: 860px) {
    .project-overview-figure,
    .project-overview-figure--left,
    .project-overview-figure--right {
      float: none;
      width: 100%;
      max-width: 760px;
      margin: 1rem auto 1.25rem;
    }
  }
</style>

<figure class="project-overview-figure project-overview-figure--{{ requested_align }}">
  <img src="{{ page.img | relative_url }}" alt="{{ page.title | escape }} overview image" loading="lazy" />
</figure>
{% endif %}
