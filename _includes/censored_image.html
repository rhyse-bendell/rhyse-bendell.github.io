<figure class="censored-image{% if include.class %} {{ include.class }}{% endif %}" data-censored-image>
  <div class="censored-image__media">
    <img
      src="{{ include.src }}"
      alt="{{ include.alt }}"
      class="censored-image__img"
      loading="lazy"
    />
    <button
      type="button"
      class="censored-image__toggle"
      aria-expanded="false"
      aria-label="Reveal sensitive image"
    >
      <span class="censored-image__label">{{ include.warning | default: "Sensitive research image" }}</span>
      <span class="censored-image__hint">Click to reveal</span>
    </button>
  </div>
  {% if include.caption %}
    <figcaption><em>{{ include.caption }}</em></figcaption>
  {% endif %}
</figure>

<style>
  .censored-image {
    margin: 0;
  }

  .censored-image__media {
    position: relative;
    overflow: hidden;
    background: #0f1115;
  }

  .censored-image__img {
    width: 100%;
    height: auto;
    display: block;
    transition: filter 0.22s ease, transform 0.22s ease;
  }

  .censored-image:not(.is-revealed) .censored-image__img {
    filter: blur(16px) brightness(0.72);
    transform: scale(1.01);
  }

  .censored-image__toggle {
    position: absolute;
    inset: 0;
    width: 100%;
    border: 0;
    margin: 0;
    padding: 1rem;
    background: rgba(5, 8, 14, 0.58);
    color: #fff;
    display: grid;
    align-content: center;
    justify-items: center;
    gap: 0.3rem;
    cursor: pointer;
    text-align: center;
  }

  .censored-image__label {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.3;
  }

  .censored-image__hint {
    font-size: 0.88rem;
    opacity: 0.95;
  }

  .censored-image.is-revealed .censored-image__toggle {
    opacity: 0;
    pointer-events: none;
  }
</style>

<script>
  (function () {
    var nodes = document.querySelectorAll('.censored-image[data-censored-image]');
    nodes.forEach(function (node) {
      if (node.dataset.censoredBound === 'true') {
        return;
      }

      var button = node.querySelector('.censored-image__toggle');
      if (!button) {
        return;
      }

      button.addEventListener('click', function () {
        node.classList.add('is-revealed');
        button.setAttribute('aria-expanded', 'true');
      });

      node.dataset.censoredBound = 'true';
    });
  })();
</script>
