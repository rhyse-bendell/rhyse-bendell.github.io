<style>
  body { background: #ffffff; }
  .container, main .container { max-width: 1160px; }
  .card, .project-card { border: 1px solid #efefef !important; box-shadow: none !important; }

  .project-card {
    position: relative;
    display: block;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    background: #111;
    text-decoration: none;
  }

  .project-card__image {
    width: 100%;
    display: block;
    object-fit: cover;
    object-position: center;
  }

  .project-card__overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    padding: 0.85rem 0.9rem;
    color: #fff;
    background:
      linear-gradient(to top, rgba(0, 0, 0, 0.84) 0%, rgba(0, 0, 0, 0.72) 36%, rgba(0, 0, 0, 0.28) 62%, rgba(0, 0, 0, 0.12) 100%);
    transition: background 180ms ease;
  }

  .project-card__content {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    padding: 0.4rem 0.5rem 0.45rem;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.38);
    backdrop-filter: blur(1px);
  }

  .project-card__title {
    margin: 0;
    font-size: 0.96rem;
    line-height: 1.25;
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.01em;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
  }

  .project-card__description {
    margin: 0;
    color: rgba(255, 255, 255, 0.95);
    font-size: 0.82rem;
    line-height: 1.38;
    opacity: 0;
    max-height: 0;
    transform: translateY(4px);
    transition: opacity 180ms ease, transform 180ms ease, max-height 180ms ease;
  }

  .project-card:hover .project-card__overlay,
  .project-card:focus-visible .project-card__overlay {
    background:
      linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.8) 40%, rgba(0, 0, 0, 0.34) 66%, rgba(0, 0, 0, 0.16) 100%);
  }

  .project-card:hover .project-card__description,
  .project-card:focus-visible .project-card__description {
    opacity: 1;
    max-height: 4.5rem;
    transform: translateY(0);
  }

  .navbar .nav-item .nav-link:hover,
  .navbar .nav-item .nav-link:focus {
    color: #2ec4c7 !important;
  }

  .navbar .nav-item.active > .nav-link,
  .navbar .nav-item .nav-link.active,
  .navbar .nav-item .nav-link[aria-current="page"],
  .navbar .navbar-nav .nav-link.active,
  .navbar .navbar-nav .nav-link[aria-current="page"],
  .nav-list .nav-list-item.active > .nav-list-link,
  .nav-list .nav-list-item .nav-list-link.active,
  .nav-list .nav-list-item .nav-list-link[aria-current="page"],
  .nav-list .nav-list-item .nav-list-link.current {
    color: #0a6f85 !important;
    font-weight: 600;
  }

  .home-portfolio {
    max-width: 1120px;
    margin: 0 auto;
  }

  .home-portfolio section {
    margin: 1.8rem 0;
  }

  .home-portfolio h2 {
    margin-bottom: 0.8rem;
    font-size: 1.45rem;
  }

  .post .profile {
    width: min(38%, 340px);
    margin-left: 2rem;
    margin-bottom: 1rem;
  }

  .post .profile img {
    width: 100%;
    max-width: 340px;
  }

  .post .profile .more-info {
    margin-top: 0.75rem;
    font-size: 0.9rem;
    line-height: 1.4;
  }

  .post .profile .more-info p { margin: 0.2rem 0; }

  .homepage-hero {
    margin-top: 0.25rem;
    display: grid;
    grid-template-columns: minmax(0, 1.6fr) minmax(300px, 1fr);
    gap: 0.95rem;
    align-items: start;
    max-width: 100%;
  }

  .homepage-hero__content {
    max-width: 68ch;
  }

  .homepage-hero__portrait-wrap {
    display: flex;
    justify-content: center;
  }

  .homepage-hero__portrait {
    width: min(100%, 420px);
    border-radius: 10px;
    display: block;
  }

  .homepage-hero .hero-name {
    margin: 0.2rem 0 0;
    font-size: clamp(1.7rem, 2.35vw, 2.2rem);
    line-height: 1.18;
    letter-spacing: -0.01em;
  }

  .homepage-hero .hero-hat {
    margin-top: 0.9rem;
  }

  .homepage-hero .hero-hat__title {
    margin: 0;
    font-size: clamp(1.2rem, 1.45vw, 1.35rem);
    line-height: 1.3;
    font-weight: 600;
  }

  .homepage-hero .hero-hat__description {
    margin: 0.35rem 0 0;
    font-size: 1rem;
    line-height: 1.55;
    color: #2f3136;
  }

  .homepage-hero .hero-credentials {
    margin-top: 1rem;
    padding-top: 0.8rem;
    border-top: 1px solid #e7e7e7;
    display: grid;
    gap: 0.6rem;
  }

  .homepage-hero .hero-credentials__group {
    display: grid;
    grid-template-columns: 40px minmax(0, 1fr);
    column-gap: 0.65rem;
    align-items: start;
  }

  .homepage-hero .hero-credentials__logo {
    width: 40px;
    height: auto;
    margin-top: 0.14rem;
    object-fit: contain;
  }

  .homepage-hero .hero-credentials__logo--mit {
    width: 42px;
  }

  .homepage-hero .hero-credentials__degree-list p {
    margin: 0;
    font-size: 0.94rem;
    line-height: 1.5;
    color: #3a3d42;
    font-family: inherit;
  }

  .homepage-hero .hero-credentials__degree-list p + p {
    margin-top: 0.35rem;
  }

  .home-portfolio .homepage-focus-areas {
    width: 100%;
  }

  .focus-areas-inline {
    width: 100%;
    max-width: none;
    font-size: 0.98rem;
    line-height: 1.6;
    color: #444;
    margin-top: 0.5rem;
  }

  .credibility-strip .credibility-item {
    border: 1px solid #e9e9e9;
    border-radius: 10px;
    padding: 0.9rem 1rem;
    background: #fff;
  }


  .portfolio-grid {
    display: grid;
    gap: 1rem;
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .portfolio-card {
    min-width: 0;
    display: flex;
  }

  .portfolio-card__image-link.project-card__image-link {
    aspect-ratio: 16 / 10;
  }

  .portfolio-card__title.project-card__title {
    font-size: 1.02rem;
  }

  .portfolio-card__description.project-card__description {
    font-size: 0.9rem;
    line-height: 1.42;
  }

  .credibility-strip {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.75rem;
  }


  .project-flow {
    display: grid;
    gap: 2rem;
  }

  .project-flow__split {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
    gap: 1.5rem;
    align-items: start;
  }

  .project-flow__split--media-right {
    grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
  }

  .project-flow__media img,
  .project-flow__media iframe {
    width: 100%;
    display: block;
    border-radius: 10px;
    border: 1px solid #e6e6e6;
    background: #fff;
  }

  .project-flow__media-embed {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    border-radius: 10px;
    border: 1px solid #e6e6e6;
    background: #000;
  }

  .project-flow__media-embed iframe {
    position: absolute;
    inset: 0;
    height: 100%;
    border: 0;
    border-radius: 0;
  }

  .project-flow__full {
    max-width: 100%;
  }

  .project-flow h2 {
    margin-top: 0;
  }

  @media (max-width: 900px) {
    .project-flow__split,
    .project-flow__split--media-right {
      grid-template-columns: 1fr;
    }

    .project-flow__split--media-right .project-flow__media {
      order: -1;
    }

    .homepage-hero {
      grid-template-columns: minmax(0, 1.45fr) minmax(260px, 1fr);
      gap: 0.9rem;
    }

    .homepage-hero__portrait {
      width: min(100%, 370px);
    }

    .post .profile {
      width: min(45%, 300px);
      margin-left: 1.25rem;
    }


    .portfolio-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .credibility-strip {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 768px) {
    .post .profile {
      width: 100%;
      max-width: 320px;
      margin: 0 auto 1.25rem;
      float: none;
    }

    .homepage-hero {
      max-width: 100%;
      grid-template-columns: 1fr;
      gap: 1.2rem;
    }

    .homepage-hero .hero-credentials__group {
      grid-template-columns: 32px minmax(0, 1fr);
      column-gap: 0.5rem;
    }

    .homepage-hero .hero-credentials__logo,
    .homepage-hero .hero-credentials__logo--mit {
      width: 32px;
    }

    .homepage-hero__portrait {
      width: min(100%, 340px);
    }

    .portfolio-grid,
    .credibility-strip {
      grid-template-columns: 1fr;
    }

  }

</style>
